<meta charset="UTF-8">
<title>こどもABCタッチ</title>

<meta name="description" content="絵を見てアルファベットをタッチし、英単語のつづりを覚える子供向けブラウザ学習ゲームです。">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eaf4ff;color:#333}
#app{width:100vw;height:100dvh;display:flex;flex-direction:column;background:linear-gradient(#eef7ff,#cfe6ff)}
.ad-small{height:50px;min-height:50px;max-height:50px;width:100%;background:rgba(255,255,255,.82);border-bottom:1px dashed rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;color:#777;font-size:12px;overflow:hidden;flex-shrink:0}
.ad-small-inner{width:320px;height:50px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ad-large{width:300px;height:250px;position:relative;z-index:1;margin:14px auto;border:2px dashed rgba(0,0,0,.18);border-radius:16px;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;color:#777;font-size:13px;overflow:hidden}
#topArea{flex:0 0 auto;padding:6px 8px 4px;display:flex;flex-direction:column;align-items:center;gap:5px}
#statusBar{width:min(98vw,760px);display:flex;justify-content:space-between;align-items:center;gap:6px;font-weight:900;font-size:12px}
.pill{background:rgba(255,255,255,.88);border:2px solid rgba(0,0,0,.07);border-radius:999px;padding:4px 8px;white-space:nowrap}
#questionCard{width:min(98vw,760px);background:rgba(255,255,255,.95);border:3px solid #69b6ff;border-radius:18px;padding:7px 8px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
#emoji{font-size:clamp(48px,13vw,92px);line-height:1}
#jaHint{font-size:clamp(16px,4.6vw,24px);font-weight:900;color:#2e7d32;line-height:1.1}
#circleHint{font-size:clamp(20px,5.4vw,32px);letter-spacing:.12em;color:#1e88e5;font-weight:900;line-height:1.1}
#answerDisplay{min-height:34px;font-size:clamp(24px,6.6vw,42px);letter-spacing:.14em;font-weight:900;color:#222;line-height:1.15}
#message{min-height:22px;font-size:16px;font-weight:900;color:#1565c0;line-height:1.2}
#controls{width:min(98vw,760px);display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
button{border:none;border-radius:999px;font-weight:900;padding:8px 6px;font-size:12px;color:#333;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);cursor:pointer}
button.primary{background:#69b6ff;color:#fff}button.on{background:#8ee6a4}button.danger{background:#ffb0a6}
#keyboardArea{flex:1 1 auto;min-height:0;padding:8px 6px 10px;background:rgba(255,255,255,.45);border-top:2px solid rgba(105,182,255,.4);overflow:hidden;display:flex;flex-direction:column;gap:6px}
#letterGrid{width:min(98vw,720px);margin:0 auto;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:6px;flex:1;min-height:0}
.letterBtn{border-radius:14px;background:#fff;border:2px solid rgba(0,0,0,.08);box-shadow:0 2px 5px rgba(0,0,0,.08);font-size:clamp(22px,6.4vw,38px);font-weight:900;color:#1565c0;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0}
.letterBtn:active{transform:scale(.95);background:#dff0ff}
#overlay{position:fixed;inset:0;z-index:20;background:rgba(234,244,255,.97);display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto}
.panel{width:min(94vw,520px);max-height:96dvh;overflow:auto;background:#fff;border:4px solid #69b6ff;border-radius:28px;padding:20px 16px;text-align:center;box-shadow:0 12px 28px rgba(0,0,0,.18)}
.panel h1{margin:0 0 8px;font-size:34px;color:#1565c0}.panel p{margin:8px 0;line-height:1.65;font-size:15px}
.startButtons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0 10px;position:relative;z-index:9999}.bigButton{padding:16px 10px;font-size:19px;background:#69b6ff;color:#fff;position:relative;z-index:10000}
@media(max-height:670px){
  .ad-large{height:180px}
  #emoji{font-size:44px}
  #jaHint{font-size:15px}
  #circleHint{font-size:20px}
  #answerDisplay{font-size:24px;min-height:28px}
  #message{font-size:14px;min-height:18px}
  button{font-size:11px;padding:6px 4px}
}
@media(max-width:380px){
  #controls{gap:4px}
  button{font-size:11px;padding:7px 3px}
  #letterGrid{gap:5px}
  .letterBtn{border-radius:11px}
}
</style>

{emoji:"🫖",word:"teapot",ja:"きゅうす",level:"hard"}
];

const ALPHA="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let mode="upper",soundOn=true,current=null,input="",score=0,miss=0,maxMiss=5,gameLevel="easy",used=[],checkTimer=null;
const letterGridEl=document.getElementById("letterGrid"),emojiEl=document.getElementById("emoji"),jaHintEl=document.getElementById("jaHint"),circleHint=document.getElementById("circleHint"),answerDisplay=document.getElementById("answerDisplay"),message=document.getElementById("message"),scoreText=document.getElementById("scoreText"),missText=document.getElementById("missText"),modeText=document.getElementById("modeText"),modeBtn=document.getElementById("modeBtn"),soundBtn=document.getElementById("soundBtn"),overlay=document.getElementById("overlay");

function injectAd(container,src,w,h){
  if(!container)return;
  container.innerHTML="";
  const ifr=document.createElement("iframe");
  ifr.width=w;ifr.height=h;ifr.scrolling="no";
  ifr.setAttribute("frameborder","0");
  ifr.style.cssText="border:0;display:block;margin:0 auto;overflow:hidden;width:"+w+"px;height:"+h+"px;";
  container.appendChild(ifr);
  try{
    const d=ifr.contentWindow.document;
    d.open();
    d.write('<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width='+w+'"><style>html,body{margin:0;padding:0;overflow:hidden;text-align:center}</style></head><body><scr'+'ipt src="'+src+'"></scr'+'ipt></body></html>');
    d.close();
  }catch(e){}
}

function speak(text,lang){
  if(!soundOn||!("speechSynthesis" in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang||"ja-JP";u.rate=lang==="en-US"?.8:.9;u.pitch=1.15;
  speechSynthesis.speak(u);
}

function buildKeyboard(){
  letterGridEl.innerHTML="";
  const letters=(mode==="upper"?ALPHA:ALPHA.toLowerCase()).split("");
  letters.forEach(ch=>{
    const d=document.createElement("div");
    d.className="letterBtn";d.textContent=ch;d.onclick=()=>pressLetter(ch);
    letterGridEl.appendChild(d);
  });
}

function getAnswer(){return mode==="upper"?current.word.toUpperCase():current.word}

function updateDisplay(){
  const a=getAnswer();
  const chars=[...input],slots=[];
  for(let i=0;i<a.length;i++)slots.push(chars[i]||"＿");
  answerDisplay.textContent=slots.join(" ");
  circleHint.textContent="○".repeat(a.length);
  jaHintEl.textContent=current?current.ja:"";
  scoreText.textContent="せいかい "+score;
  missText.textContent="ミス "+miss+"/"+maxMiss;
  modeText.textContent=mode==="upper"?"大文字 ABC":"小文字 abc";
  modeBtn.textContent=mode==="upper"?"abc":"ABC";
  soundBtn.textContent=soundOn?"おとON":"おとOFF";
  soundBtn.className=soundOn?"on":"";
}

function nextQuestion(){
  clearCheckTimer();
  input="";
  let pool;
  if(gameLevel==="easy"){
    pool=questions.filter(q=>q.level==="easy");
  }else if(gameLevel==="normal"){
    pool=questions.filter(q=>q.level==="easy"||q.level==="normal");
  }else{
    pool=questions;
  }
  if(used.length>=pool.length)used=[];
  let q;
  do{q=pool[Math.floor(Math.random()*pool.length)]}while(used.includes(q.word)&&pool.length>1);
  used.push(q.word);
  current=q;
  emojiEl.textContent=current.emoji;
  message.textContent="「"+current.ja+"」を えいごで！";
  updateDisplay();
  speak(current.ja,"ja-JP");
}

function clearCheckTimer(){
  if(checkTimer){
    clearTimeout(checkTimer);
    checkTimer=null;
  }
}

function scheduleCheckIfFull(){
  clearCheckTimer();
  const a=getAnswer();
  if(input.length===a.length){
    checkTimer=setTimeout(()=>{
      checkTimer=null;
      checkIfFull();
    },900);
  }
}

function pressLetter(ch){
  if(!current)return;
  const a=getAnswer();
  if(input.length>=a.length)return;
  clearCheckTimer();
  input+=ch;
  speak(ch,"en-US");
  updateDisplay();
  scheduleCheckIfFull();
}

function showAnswer(){
  clearCheckTimer();
  if(!current)return;
  const a=getAnswer();
  input=a;
  message.textContent="こたえは「"+a+"」";
  updateDisplay();
  speak(current.word,"en-US");
}

function checkIfFull(){
  const a=getAnswer();
  if(input.length===a.length){
    if(input===a){
      score++;
      message.textContent="せいかい！";
      speak(current.word,"en-US");
      setTimeout(nextQuestion,1100);
    }else{
      miss++;
      message.textContent="もういちど";
      speak("もういちど","ja-JP");
      input="";
      setTimeout(updateDisplay,280);
      if(miss>=maxMiss)setTimeout(gameOver,500);
    }
  }
}

window.startGame=function startGame(level){
  clearCheckTimer();
  gameLevel=level;score=0;miss=0;used=[];
  overlay.style.display="none";
  nextQuestion();
}

function showTitle(){
  clearCheckTimer();
  input="";
  overlay.style.display="flex";
  overlay.innerHTML=`<div class="panel">
    <h1>こども<br>ABCタッチ</h1>
    <p>えをみて、したのアルファベットをタッチしよう。<br>えいごのたんごの つづりを おぼえられます。</p>

    <div class="startButtons">
      <button class="bigButton" type="button" onclick="startGame('easy')">やさしい</button>
      <button class="bigButton" type="button" onclick="startGame('normal')">ふつう</button>
      <button class="bigButton" type="button" onclick="startGame('hard')">むずかしい</button>
    </div>

    <div class="ad-large" id="titleAdBox"></div>
  </div>`;

  const adBox=document.getElementById("titleAdBox");
  injectAd(adBox,"https://adm.shinobi.jp/s/7b3a5ddb43f4cb9eadb45b1c506ee384",300,250);
}

function gameOver(){
  overlay.style.display="flex";
  overlay.innerHTML=`<div class="panel">
    <h1>おしまい</h1>
    <p>せいかい：<b>${score}</b>もん</p>
    <p>もういちどチャレンジしてみよう！</p>

    <div class="startButtons">
      <button class="bigButton" type="button" onclick="startGame('easy')">やさしい</button>
      <button class="bigButton" type="button" onclick="startGame('normal')">ふつう</button>
      <button class="bigButton" type="button" onclick="startGame('hard')">むずかしい</button>
    </div>

    <div class="ad-large" id="gameOverAd"></div>
  </div>`;

  const adBox=document.getElementById("gameOverAd");
  injectAd(adBox,"https://adm.shinobi.jp/s/7b3a5ddb43f4cb9eadb45b1c506ee384",300,250);

  speak("おしまい。もういちど やってみよう","ja-JP");
}

modeBtn.onclick=()=>{
  clearCheckTimer();
  mode=mode==="upper"?"lower":"upper";
  input="";
  buildKeyboard();
  updateDisplay();
  speak(mode==="upper"?"大文字":"小文字","ja-JP");
};
soundBtn.onclick=()=>{
  soundOn=!soundOn;
  if(!soundOn&&"speechSynthesis" in window)speechSynthesis.cancel();
  updateDisplay();
};
document.getElementById("backBtn").onclick=()=>{clearCheckTimer();input=input.slice(0,-1);updateDisplay()};
document.getElementById("clearBtn").onclick=()=>{clearCheckTimer();input="";updateDisplay()};
document.getElementById("nextBtn").onclick=()=>nextQuestion();
document.getElementById("answerBtn").onclick=()=>showAnswer();
document.getElementById("titleBtn").onclick=()=>showTitle();

document.addEventListener("click",(e)=>{
  if(e.target && e.target.matches(".bigButton")){
    const text=e.target.textContent.trim();
    if(text==="やさしい") startGame("easy");
    if(text==="ふつう") startGame("normal");
    if(text==="むずかしい") startGame("hard");
  }
});

buildKeyboard();
current=questions[0];
updateDisplay();
</script>
</body>
</html>
